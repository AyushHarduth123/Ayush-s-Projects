version: 2.1

orbs:
  node: circleci/node@5.2.0
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  build_test_scan:
    docker:
      - image: cimg/node:20.15
    steps:
      - checkout

      - run:
          name: Show Node versions
          command: node -v && npm -v

      # --- Install deps ---
      - run:
          name: Install API deps
          working_directory: payments-api
          command: npm ci || npm i
      - run:
          name: Install Client deps
          working_directory: payments-client
          command: npm ci || npm i

      # --- Security audit (non-failing so first run passes) ---
      - run:
          name: npm audit (API)
          working_directory: payments-api
          command: npm audit --omit=dev || true
      - run:
          name: npm audit (Client)
          working_directory: payments-client
          command: npm audit --omit=dev || true

      # --- Lint/Test only if scripts exist ---
      - run:
          name: Lint/Test API (best-effort)
          working_directory: payments-api
          command: |
            if npm run -s | grep -q "^  lint"; then npm run lint; else echo "no lint script"; fi
            if npm run -s | grep -q "^  test"; then npm test; else echo "no test script"; fi
      - run:
          name: Lint/Test Client (best-effort)
          working_directory: payments-client
          command: |
            if npm run -s | grep -q "^  lint"; then npm run lint; else echo "no lint script"; fi
            if npm run -s | grep -q "^  test"; then npm test; else echo "no test script"; fi

      # --- SonarCloud scan (uses sonar-project.properties at repo root) ---
      - sonarcloud/scan

workflows:
  main:
    jobs:
      - build_test_scan
